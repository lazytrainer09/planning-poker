services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    expose:
      - "8080"
    volumes:
      - poker-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/planning_poker.db
    restart: unless-stopped

  backend-test:
    build:
      context: ./backend
      target: test
    profiles: [test]

  frontend-test:
    build:
      context: ./frontend
      target: test
    profiles: [test]

volumes:
  poker-data:
